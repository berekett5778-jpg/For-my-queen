<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: normal;
            margin: 0;
            position: absolute;
            top: 10%;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            user-select: none;
            z-index: 10;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1>I Love You</h1>
    <canvas id="heartCanvas"></canvas>

    <script>
        // 1. The Point class from your image (Fixed & Operational)
        var Point = (function () {
            function Point(x, y) {
                this.x = (typeof x !== 'undefined') ? x : 0;
                this.y = (typeof y !== 'undefined') ? y : 0;
            }
            Point.prototype.clone = function () {
                return new Point(this.x, this.y);
            };
            return Point;
        })();

        // 2. Particle and Heart Animation Engine
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let settings = {
            particles: {
                length:   500, 
                duration: 2,   
                velocity: 100, 
                effect:   -0.75, 
                size:     3,    
            },
        };

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Heart math function
        function pointOnHeart(t) {
            return new Point(
                160 * Math.pow(Math.sin(t), 3),
                130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t)
            );
        }

        // Particle Pool Setup
        var Particle = (function () {
            function Particle() {
                this.position = new Point();
                this.velocity = new Point();
                this.acceleration = new Point();
                this.age = 0;
            }
            Particle.prototype.initialize = function (x, y, dx, dy) {
                this.position.x = x;
                this.position.y = y;
                this.velocity.x = dx;
                this.velocity.y = dy;
                this.acceleration.x = dx * settings.particles.effect;
                this.acceleration.y = dy * settings.particles.effect;
                this.age = 0;
            };
            Particle.prototype.update = function (deltaTime) {
                this.position.x += this.velocity.x * deltaTime;
                this.position.y += this.velocity.y * deltaTime;
                this.velocity.x += this.acceleration.x * deltaTime;
                this.velocity.y += this.acceleration.y * deltaTime;
                this.age += deltaTime;
            };
            Particle.prototype.draw = function (context) {
                function ease(t) {
                    return (--t) * t * t + 1;
                }
                var size = settings.particles.size * ease(this.age / settings.particles.duration);
                context.fillStyle = '#50b4ff'; // Neon blue matching your video
                context.shadowBlur = 10;
                context.shadowColor = '#50b4ff';
                context.fillRect(this.position.x - size / 2, this.position.y - size / 2, size, size);
            };
            return Particle;
        })();

        var ParticlePool = (function () {
            var particles,
                firstActive = 0,
                firstFree   = 0,
                duration    = settings.particles.duration;

            function ParticlePool(length) {
                particles = new Array(length);
                for (var i = 0; i < particles.length; i++) particles[i] = new Particle();
            }
            ParticlePool.prototype.add = function (x, y, dx, dy) {
                particles[firstFree].initialize(x, y, dx, dy);
                firstFree++;
                if (firstFree == particles.length) firstFree = 0;
                if (firstActive == firstFree) {
                    firstActive++;
                    if (firstActive == particles.length) firstActive = 0;
                }
            };
            ParticlePool.prototype.update = function (deltaTime) {
                var i;
                if (firstActive < firstFree) {
                    for (i = firstActive; i < firstFree; i++) particles[i].update(deltaTime);
                }
                if (firstFree < firstActive) {
                    for (i = firstActive; i < particles.length; i++) particles[i].update(deltaTime);
                    for (i = 0; i < firstFree; i++) particles[i].update(deltaTime);
                }
                while (particles[firstActive].age >= duration && firstActive != firstFree) {
                    firstActive++;
                    if (firstActive == particles.length) firstActive = 0;
                }
            };
            ParticlePool.prototype.draw = function (context) {
                var i;
                if (firstActive < firstFree) {
                    for (i = firstActive; i < firstFree; i++) particles[i].draw(context);
                }
                if (firstFree < firstActive) {
                    for (i = firstActive; i < particles.length; i++) particles[i].draw(context);
                    for (i = 0; i < firstFree; i++) particles[i].draw(context);
                }
            };
            return ParticlePool;
        })();

        // Render Loop
        const pool = new ParticlePool(settings.particles.length);
        let lastTime = Date.now();

        function render() {
            requestAnimationFrame(render);

            let now = Date.now();
            let deltaTime = (now - lastTime) / 1000;
            lastTime = now;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0; // Clear shadows for performance before redraw

            // Generate new particles
            var amount = settings.particles.length * deltaTime;
            for (var i = 0; i < amount; i++) {
                var pos = pointOnHeart(Math.random() * Math.PI * 2);
                var dir = pos.clone();
                dir.x *= 0.3; // Scale velocity down slightly for a tighter flow
                dir.y *= 0.3;
                pool.add(
                    canvas.width / 2 + pos.x,
                    canvas.height / 2 - pos.y,
                    dir.x,
                    -dir.y
                );
            }

            pool.update(deltaTime);
            pool.draw(ctx);
        }

        render();
    </script>
</body>
</html>
