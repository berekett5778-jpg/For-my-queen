<!DOCTYPE html>
<html>
<head>
<title>I Love You ❤️</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

h1 {
  position: absolute;
  top: 80px;
  color: #00eaff;
  font-size: 55px;
  text-shadow: 0 0 20px cyan;
}

canvas {
  position: absolute;
}
</style>
</head>

<body>

<h1>I Love You</h1>

<canvas id="heart"></canvas>

<script>
const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heart(t) {
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t)
      - 5 * Math.cos(2*t)
      - 2 * Math.cos(3*t)
      - Math.cos(4*t));

  return {
    x: x * 18,
    y: y * 18
  };
}

for (let i = 0; i < 600; i++) {
  let t = Math.random() * Math.PI * 2;
  let p = heart(t);

  particles.push({
    x: canvas.width/2 + p.x,
    y: canvas.height/2 + p.y,
    ox: p.x,
    oy: p.y,
    size: Math.random()*2 + 1,
    speed: Math.random()*0.02
  });
}

let time = 0;

function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  time += 0.05;
  let pulse = 1 + Math.sin(time) * 0.12;

  particles.forEach(p=>{
    let x = canvas.width/2 + p.ox * pulse;
    let y = canvas.height/2 + p.oy * pulse;

    ctx.beginPath();
    ctx.arc(
      x,
      y,
      p.size,
      0,
      Math.PI*2
    );

    ctx.fillStyle = "#00d9ff";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.onresize = ()=>{
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
</script>

</body>
</html>
